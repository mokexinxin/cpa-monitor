interval: 60s

cliproxy:
  base_url: http://127.0.0.1:8317
  management_key: ""
  management_key_env: CPA_MANAGEMENT_KEY
  service_port: 0
  timeout: 10s

thresholds:
  memory_percent: 80
  disk_percent: 80
  total_tcp_connections: 3000
  service_port_connections: 800

alerts:
  send_recovery: false
  state_file: state/alerts.json
  # Supported values: smtp or dingtalk. Fallback is attempted only after the
  # primary send fails; a successful fallback completes that occurrence.
  primary_channel: dingtalk
  fallback_channel: smtp

# When enabled, the first completely healthy monitoring cycle sends a report
# immediately. Later reports follow interval; failed deliveries use the shorter
# retry interval. Times persist in alerts.state_file across service restarts.
health_report:
  enabled: true
  interval: 24h
  retry_interval: 15m
  # Empty follows alerts.primary_channel. An explicit channel does not use the
  # alert fallback.
  channel: ""

dingtalk:
  # Copy only the access_token value from the custom robot Webhook into the
  # environment. The endpoint itself is fixed by cpa-monitor.
  webhook_token: ""
  webhook_token_env: CPA_DINGTALK_WEBHOOK_TOKEN
  signing_secret: ""
  signing_secret_env: CPA_DINGTALK_SIGNING_SECRET
  language: zh-CN
  timeout: 10s
  max_items: 10
  at_user_ids: []
  at_mobiles: []
  at_all: false

smtp:
  host: smtp.example.com
  port: 587
  # zh-CN (default) or en. Applies to alert, recovery, and health emails.
  language: zh-CN
  username: ""
  username_env: CPA_SMTP_USERNAME
  password: ""
  password_env: CPA_SMTP_PASSWORD
  from: cpa-monitor@example.com
  to:
    - admin@example.com
  starttls: true
  tls: false
  timeout: 10s

logging:
  level: info
  file:
    enabled: false
    path: logs/monitor.log
    max_size_mb: 20
    max_files: 5
    max_total_size_mb: 80
